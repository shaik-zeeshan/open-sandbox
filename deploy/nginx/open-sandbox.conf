map $http_upgrade $connection_upgrade {
	default upgrade;
	'' close;
}

# Main application and preview subdomains.
# Replace "sandbox.example.com" with your actual domain.
# The wildcard (*.preview.example.com) MUST match your SANDBOX_PREVIEW_BASE_DOMAIN
# so that preview URLs for sandboxes, containers, and compose services are proxied
# to Traefik correctly instead of falling back to the default server (403).
#
# Example with custom preview base domain:
#   server_name sandbox.example.com *.preview.example.com;
#
# If SANDBOX_PREVIEW_BASE_DOMAIN is left at default derivation from SANDBOX_PUBLIC_BASE_URL,
# the preview domain is "preview.<base-domain>". For example:
#   SANDBOX_PUBLIC_BASE_URL=https://sandbox.example.com  →  preview.example.com
#   server_name sandbox.example.com *.preview.example.com;
server {
	listen 80;
	server_name sandbox.example.com *.preview.example.com;

	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_request_buffering off;
		proxy_buffering off;
		proxy_read_timeout 1h;
	}
}

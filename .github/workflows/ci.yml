name: CI

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run client checks
        run: bun run check:client

      - name: Run server tests
        run: bun run test:server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate server image build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          push: false
          tags: open-sandbox/server:ci

      - name: Validate client image build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/client/Dockerfile
          push: false
          build-args: |
            VITE_SANDBOX_BASE_URL=/
          tags: open-sandbox/client:ci

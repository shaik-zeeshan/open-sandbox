services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.6}
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_started
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.forwardedHeaders.insecure=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    volumes:
      - ${OPEN_SANDBOX_DATA_DIR:-/tmp/open-sandbox}/traefik/dynamic:/etc/traefik/dynamic:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPEN_SANDBOX_HTTP_PORT:-3000}:80"

  server:
    image: golang:1.25.5-alpine
    depends_on:
      client:
        condition: service_started
    working_dir: /workspace/apps/server
    command:
      - sh
      - -c
      - apk add --no-cache curl docker-cli-compose && go tool air -c .air.toml
    environment:
      PORT: "8080"
      SANDBOX_DB_PATH: /data/open-sandbox.db
      SANDBOX_JWT_SECRET: ${SANDBOX_JWT_SECRET:-dev-jwt-signing-secret}
      SANDBOX_WORKSPACE_DIR: ${OPEN_SANDBOX_DATA_DIR:-/tmp/open-sandbox}/workspace
      SANDBOX_RUNTIME_MEMORY_LIMIT: ${SANDBOX_RUNTIME_MEMORY_LIMIT:-4g}
      SANDBOX_RUNTIME_CPU_LIMIT: ${SANDBOX_RUNTIME_CPU_LIMIT:-2}
      SANDBOX_RUNTIME_PIDS_LIMIT: ${SANDBOX_RUNTIME_PIDS_LIMIT:-512}
      SANDBOX_MAINTENANCE_ARTIFACT_MAX_AGE: ${SANDBOX_MAINTENANCE_ARTIFACT_MAX_AGE:-168h}
      SANDBOX_MAINTENANCE_MISSING_SANDBOX_MAX_AGE: ${SANDBOX_MAINTENANCE_MISSING_SANDBOX_MAX_AGE:-24h}
      SANDBOX_TRAEFIK_DYNAMIC_CONFIG_DIR: /traefik/dynamic
      GOCACHE: /go-cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OPEN_SANDBOX_DATA_DIR:-/tmp/open-sandbox}/db:/data
      - ${OPEN_SANDBOX_DATA_DIR:-/tmp/open-sandbox}/workspace:${OPEN_SANDBOX_DATA_DIR:-/tmp/open-sandbox}/workspace
      - ${OPEN_SANDBOX_DATA_DIR:-/tmp/open-sandbox}/traefik/dynamic:/traefik/dynamic
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/go-cache
    expose:
      - "8080"

  client:
    image: oven/bun:1.3.5-alpine
    working_dir: /workspace
    command:
      - sh
      - -c
      - bun install --frozen-lockfile && cd apps/client && bun run dev -- --host 0.0.0.0 --port 80
    environment:
      VITE_SANDBOX_BASE_URL: /
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/workspace
      - bun-modules:/workspace/node_modules
    expose:
      - "80"

volumes:
  bun-modules:
  go-mod-cache:
  go-build-cache:

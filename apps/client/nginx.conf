map $http_upgrade $connection_upgrade {
	default upgrade;
	'' close;
}

map $http_x_forwarded_host $proxy_forwarded_host {
	default $http_x_forwarded_host;
	'' $http_host;
}

map $http_x_forwarded_proto $proxy_forwarded_proto {
	default $http_x_forwarded_proto;
	'' $scheme;
}

server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	location /api/ {
		proxy_pass http://server:8080;
		proxy_http_version 1.1;
		proxy_set_header Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_request_buffering off;
		proxy_buffering off;
		proxy_read_timeout 1h;
	}

	location /auth/ {
		proxy_pass http://server:8080;
		proxy_http_version 1.1;
		proxy_set_header Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
		proxy_buffering off;
	}

	location = /health {
		proxy_pass http://server:8080;
		proxy_set_header Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
	}

	location = /metrics {
		proxy_pass http://server:8080;
		proxy_http_version 1.1;
		proxy_set_header Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
	}

	location /swagger/ {
		proxy_pass http://server:8080;
		proxy_http_version 1.1;
		proxy_set_header Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
	}

	location / {
		try_files $uri $uri/ /index.html;
	}
}
